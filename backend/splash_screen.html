<style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-effect {
            background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 55, 0.05) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 8s infinite linear;
        }

        @keyframes monogram-draw {
            0% { stroke-dashoffset: 1000; opacity: 0; }
            50% { opacity: 1; }
            100% { stroke-dashoffset: 0; }
        }
        .monogram-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: monogram-draw 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes pulse-gold {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6)); }
        }
        .gold-glow {
            animation: pulse-gold 3s infinite ease-in-out;
        }

        .loading-bar-container {
            width: 240px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 9999px;
        }
        .loading-progress {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #D4AF37; /* Rich Gold */
            transition: width 0.5s ease-out;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-primary overflow-hidden">
<!-- Main Splash Screen Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Subtle Shimmer Overlay -->
<div class="absolute inset-0 shimmer-effect pointer-events-none opacity-40"></div>
<!-- Ambient Background Light -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container/30 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Logo/Monogram Section -->
<div class="relative z-10 flex flex-col items-center">
<div class="mb-lg gold-glow">
<!-- SVG Monogram 'LB' -->
<svg class="w-24 h-24 md:w-32 md:h-32" fill="none" height="120" viewbox="0 0 100 100" width="120" xmlns="http://www.w3.org/2000/svg">
<!-- Stylized L -->
<path class="monogram-path" d="M30 20V70C30 75 35 80 40 80H70" stroke="#D4AF37" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
<!-- Stylized B -->
<path class="monogram-path" d="M45 20H60C70 20 75 28 75 35C75 42 70 50 60 50C70 50 78 58 78 67.5C78 77 70 80 60 80H45V20Z" stroke="#D4AF37" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" style="animation-delay: 0.5s;"></path>
</svg>
</div>
<!-- Brand Typography -->
<div class="text-center space-y-md">
<h1 class="font-headline-xl text-headline-xl text-on-primary tracking-[0.2em] opacity-0 animate-[fadeIn_1.5s_ease-out_1s_forwards]">
                    LUXEBOOK
                </h1>
<p class="font-label-caps text-label-caps text-tertiary-fixed-dim/70 uppercase tracking-[0.4em] opacity-0 animate-[fadeIn_1.5s_ease-out_1.5s_forwards]">
                    Elevating Excellence
                </p>
</div>
</div>
<!-- Progress Section -->
<div class="absolute bottom-xl flex flex-col items-center gap-base">
<div class="loading-bar-container">
<div class="loading-progress" id="progressBar"></div>
</div>
<span class="font-label-caps text-[10px] text-tertiary-fixed-dim/50 tracking-widest" id="loadingPercent">0%</span>
</div>
<!-- Bottom Footer Branding -->
<div class="absolute bottom-md opacity-30">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px] text-on-primary">workspace_premium</span>
<span class="font-label-caps text-[10px] text-on-primary tracking-widest">PRIVATE CONCIERGE NETWORK</span>
</div>
</div>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progressBar');
            const percentText = document.getElementById('loadingPercent');
            let progress = 0;

            const updateLoading = () => {
                // Smooth non-linear progress simulation
                if (progress < 100) {
                    const increment = Math.random() * (progress > 80 ? 0.5 : 2.5);
                    progress = Math.min(100, progress + increment);
                    
                    progressBar.style.width = `${progress}%`;
                    percentText.textContent = `${Math.floor(progress)}%`;
                    
                    // Recursive call with random timing for organic feel
                    const nextTick = Math.random() * 150 + 50;
                    setTimeout(updateLoading, nextTick);
                } else {
                    // Completion handling - subtle pulse when full
                    progressBar.classList.add('shadow-[0_0_10px_#D4AF37]');
                    
                    // Transition to app (simulated)
                    setTimeout(() => {
                        document.body.style.transition = 'opacity 1s ease-in-out';
                        document.body.style.opacity = '0';
                    }, 800);
                }
            };

            // Start loading sequence after initial monogram animation
            setTimeout(updateLoading, 1500);
        });

        // Interactive micro-interaction for the cursor/background
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.querySelector('.shimmer-effect').style.backgroundPosition = `${x}% ${y}%`;
        });
    </script>
</body></html>
